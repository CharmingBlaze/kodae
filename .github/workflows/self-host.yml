name: Self-host smoke

on:
  workflow_dispatch:

jobs:
  two-stage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install clang
        run: sudo apt-get update && sudo apt-get install -y clang

      - name: Two-stage compiler build
        run: bash scripts/self_host_check.sh

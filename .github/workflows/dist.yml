name: Distribution

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Bundle ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows
            arch: amd64
            archive_ext: zip
          - os: linux
            arch: amd64
            archive_ext: tar.gz
          - os: darwin
            arch: arm64
            archive_ext: tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Fetch TinyCC for bundle target
        run: chmod +x scripts/fetch-tcc.sh && ./scripts/fetch-tcc.sh ${{ matrix.os }} ${{ matrix.arch }}

      - name: Build base bundle
        run: |
          go run ./cmd/kodae bundle ${{ matrix.os }} ${{ matrix.arch }}

      - name: Validate bundle layout
        env:
          TARGET_OS: ${{ matrix.os }}
          TARGET_ARCH: ${{ matrix.arch }}
        run: |
          bundle="dist/kodae-${TARGET_OS}-${TARGET_ARCH}"
          test -d "$bundle/bin"
          test -d "$bundle/include"
          test -d "$bundle/examples"
          test -f "$bundle/README.md"
          if [ "$TARGET_OS" = "windows" ]; then
            test -f "$bundle/bin/kodae.exe"
            test -f "$bundle/toolchain/tcc.exe"
          else
            test -f "$bundle/bin/kodae"
            test -f "$bundle/toolchain/tcc"
          fi

      - name: Create release archive
        env:
          TARGET_OS: ${{ matrix.os }}
          TARGET_ARCH: ${{ matrix.arch }}
          EXT: ${{ matrix.archive_ext }}
        run: |
          cd dist
          name="kodae-${TARGET_OS}-${TARGET_ARCH}"
          if [ "$EXT" = "zip" ]; then
            zip -qr "../${name}.zip" "$name"
          else
            tar -czf "../${name}.tar.gz" "$name"
          fi

      - name: Upload artifact (zip)
        if: matrix.archive_ext == 'zip'
        uses: actions/upload-artifact@v4
        with:
          name: kodae-${{ matrix.os }}-${{ matrix.arch }}
          path: kodae-${{ matrix.os }}-${{ matrix.arch }}.zip
          if-no-files-found: error

      - name: Upload artifact (tar.gz)
        if: matrix.archive_ext != 'zip'
        uses: actions/upload-artifact@v4
        with:
          name: kodae-${{ matrix.os }}-${{ matrix.arch }}
          path: kodae-${{ matrix.os }}-${{ matrix.arch }}.tar.gz
          if-no-files-found: error

  release:
    name: Publish GitHub release assets
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all built archives
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*

name: Distribution

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build & Bundle
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: windows
            arch: amd64
            zig_url: https://ziglang.org/download/0.12.0/zig-windows-x86_64-0.12.0.zip
            zig_exe: zig.exe
            archive: zip
          - os: linux
            arch: amd64
            zig_url: https://ziglang.org/download/0.12.0/zig-linux-x86_64-0.12.0.tar.xz
            zig_exe: zig
            archive: tar.gz
          - os: darwin
            arch: arm64
            zig_url: https://ziglang.org/download/0.12.0/zig-macos-aarch64-0.12.0.tar.xz
            zig_exe: zig
            archive: tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build and Bundle
        run: |
          go run ./cmd/clio bundle ${{ matrix.os }} ${{ matrix.arch }}

      - name: Download Zig
        run: |
          curl -L ${{ matrix.zig_url }} -o zig_archive
          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            unzip zig_archive -d zig_temp
          else
            mkdir zig_temp
            tar -xf zig_archive -C zig_temp
          fi
          # Find the zig binary in the extracted folder
          ZIG_BIN=$(find zig_temp -name "${{ matrix.zig_exe }}" -type f)
          cp "$ZIG_BIN" "dist/clio-${{ matrix.os }}-${{ matrix.arch }}/toolchain/zig/"

      - name: Create Archive
        run: |
          cd dist
          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            zip -r ../clio-${{ matrix.os }}-${{ matrix.arch }}.zip clio-${{ matrix.os }}-${{ matrix.arch }}
          else
            tar -czf ../clio-${{ matrix.os }}-${{ matrix.arch }}.tar.gz clio-${{ matrix.os }}-${{ matrix.arch }}
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: clio-${{ matrix.os }}-${{ matrix.arch }}
          path: clio-${{ matrix.os }}-${{ matrix.arch }}.${{ matrix.archive }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*

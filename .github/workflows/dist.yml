name: Distribution

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Bundle ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows
            arch: amd64
            zig_url: https://ziglang.org/download/0.12.0/zig-windows-x86_64-0.12.0.zip
            zig_exe: zig.exe
            archive_ext: zip
          - os: linux
            arch: amd64
            zig_url: https://ziglang.org/download/0.12.0/zig-linux-x86_64-0.12.0.tar.xz
            zig_exe: zig
            archive_ext: tar.gz
          - os: darwin
            arch: arm64
            zig_url: https://ziglang.org/download/0.12.0/zig-macos-aarch64-0.12.0.tar.xz
            zig_exe: zig
            archive_ext: tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build base bundle
        run: |
          go run ./cmd/kodae bundle ${{ matrix.os }} ${{ matrix.arch }}

      - name: Download and place Zig
        env:
          ZIG_URL: ${{ matrix.zig_url }}
          ZIG_EXE: ${{ matrix.zig_exe }}
          TARGET_OS: ${{ matrix.os }}
          TARGET_ARCH: ${{ matrix.arch }}
        run: |
          curl -L "$ZIG_URL" -o zig_archive
          mkdir -p zig_temp
          case "$ZIG_URL" in
            *.zip) unzip -q zig_archive -d zig_temp ;;
            *.tar.xz) tar -xf zig_archive -C zig_temp ;;
            *) echo "unsupported zig archive: $ZIG_URL"; exit 1 ;;
          esac

          python - <<'PY'
          import os
          from pathlib import Path

          root = Path("zig_temp")
          zig_exe = os.environ["ZIG_EXE"]
          target = Path("dist") / f"kodae-{os.environ['TARGET_OS']}-{os.environ['TARGET_ARCH']}" / "toolchain" / "zig" / zig_exe
          matches = list(root.rglob(zig_exe))
          if not matches:
              raise SystemExit(f"zig binary {zig_exe} not found after extraction")
          target.parent.mkdir(parents=True, exist_ok=True)
          target.write_bytes(matches[0].read_bytes())
          if zig_exe != "zig.exe":
              target.chmod(0o755)
          print(f"wrote bundled zig to {target}")
          PY

      - name: Validate bundle layout
        env:
          TARGET_OS: ${{ matrix.os }}
          TARGET_ARCH: ${{ matrix.arch }}
        run: |
          bundle="dist/kodae-${TARGET_OS}-${TARGET_ARCH}"
          test -d "$bundle/bin"
          test -d "$bundle/toolchain/zig"
          test -d "$bundle/include"
          test -d "$bundle/examples"
          test -f "$bundle/README.md"
          if [ "$TARGET_OS" = "windows" ]; then
            test -f "$bundle/bin/kodae.exe"
            test -f "$bundle/toolchain/zig/zig.exe"
          else
            test -f "$bundle/bin/kodae"
            test -f "$bundle/toolchain/zig/zig"
          fi

      - name: Create release archive
        env:
          TARGET_OS: ${{ matrix.os }}
          TARGET_ARCH: ${{ matrix.arch }}
          EXT: ${{ matrix.archive_ext }}
        run: |
          cd dist
          name="kodae-${TARGET_OS}-${TARGET_ARCH}"
          if [ "$EXT" = "zip" ]; then
            zip -qr "../${name}.zip" "$name"
          else
            tar -czf "../${name}.tar.gz" "$name"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kodae-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            kodae-${{ matrix.os }}-${{ matrix.arch }}.zip
            kodae-${{ matrix.os }}-${{ matrix.arch }}.tar.gz
          if-no-files-found: error

  release:
    name: Publish GitHub release assets
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all built archives
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
